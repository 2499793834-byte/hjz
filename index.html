<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄建智的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }
        body {
            background-color: #f5f5f5;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }
        header {
            text-align: center;
            padding: 3rem 0;
            background-color: #2c3e50;
            color: white;
            border-radius: 10px;
            margin-bottom: 2rem;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 1rem;
        }
        section {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 1rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 0.5rem;
        }
        .skills-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .skill-item {
            background: #f0f4f8;
            padding: 0.8rem;
            border-radius: 6px;
            text-align: center;
            color: #2c3e50;
        }
        footer {
            text-align: center;
            color: #666;
            padding: 2rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部介绍 -->
        <header>
            <img src="‪C:\Users\lzy09\Desktop\图片\IMG_0470.jpeg" alt="头像" class="avatar">
            <h1>黄建智</h1>
            <p>和平精英玩家 | 嫖娼爱好者</p>
        </header>

        <!-- 关于我 -->
        <section>
            <h2>关于我</h2>
            <p>各位全民制作人你们好！我是一名南职大的一名学生，擅长旅行和色色，偶像是蔡徐坤，会唱,跳,rap和打篮球~</p>
        </section>

        <!-- 我的技能 -->
        <section>
            <h2>我的手艺</h2>
            <div class="skills-list">
                <div class="skill-item">唱</div>
                <div class="skill-item">跳</div>
                <div class="skill-item">rap</div>
                <div class="skill-item">打篮球</div>
            </div>
        </section>

        <!-- 联系方式 -->
        <section>
            <h2>联系方式</h2>
            <p>邮箱：2709093344qq.com</p>
            <p>电话：13457136426</p>
        </section>

        <footer>
            <p> 2026 我的个人主页</p>
        </footer>
    </div>
</body>
</html>
